name = "newsletter-tracker"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Custom-domain route for the tracker (pixel, click, unsubscribe, attachment download).
routes = [{ pattern = "track.eneanewsletter.it", custom_domain = true }]

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "c6995e6a-216d-4ed2-9390-1fc36fb51f1b"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "newsletter-archive"

# Secrets (set via `wrangler secret put`):
#   LINK_SIGNING_KEY
#   ATTACHMENT_SIGNING_KEY
