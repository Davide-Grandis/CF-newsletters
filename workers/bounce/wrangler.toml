name = "newsletter-bounce"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
HARD_BOUNCE_THRESHOLD = "1"   # mark bounced after N hard bounces
SOFT_BOUNCE_THRESHOLD = "5"

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "c6995e6a-216d-4ed2-9390-1fc36fb51f1b"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "newsletter-archive"

# Email Routing rule:
#   bounce+*@eneanewsletter.it  -> Worker `newsletter-bounce`
